services:
  - type: web
    name: airbnb-api
    env: python
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./airbnb.db
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
